name: bridalglow_mobile
description: "BridalGlow mobile application for wedding dress rental."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  provider: ^6.1.5
  json_annotation: ^4.8.1
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.3.3
  flutter_stripe: ^10.1.1
  flutter_form_builder: ^10.1.0
  form_builder_validators: ^11.2.0
  signalr_netcore: ^1.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.9.5
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
