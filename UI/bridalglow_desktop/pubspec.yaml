name: bridalglow_desktop
description: "BridalGlow desktop application for salon management."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  provider: ^6.1.5
  json_annotation: ^4.8.1
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0
  fl_chart: ^0.70.0
  file_picker: ^8.0.0
  printing: ^5.14.2
  http_parser: ^4.0.2
  signalr_netcore: ^1.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.9.5
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
